app-id: com.pens.Paint
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: paint
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=home
modules:
  - name: paint
    buildsystem: simple
    build-commands:
      - install -Dm755 paint.py /app/bin/paint
    sources:
      - type: file
        path: paint.py
