app-id: com.pens.SystemInfo
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: system_info.py
finish-args:
  # Windowing system access
  - --socket=wayland
  - --socket=fallback-x11
  # Audio access (standard for GUI apps)
  - --socket=pulseaudio
  # Read-only access to /proc for CPU, memory, network stats
  - --filesystem=/proc:ro
  # Device access needed for full hardware visibility
  - --device=all

modules:
  - name: system-info
    sources:
      - type: file
        path: system_info.py
    buildsystem: simple
    build-commands:
      - install -D system_info.py /app/bin/system_info.py
      - chmod +x /app/bin/system_info.py
