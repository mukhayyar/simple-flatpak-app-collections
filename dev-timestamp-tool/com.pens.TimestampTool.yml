app-id: com.pens.TimestampTool
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: timestamp_tool
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: timestamp_tool
    buildsystem: simple
    build-commands:
      - install -Dm755 timestamp_tool.py /app/bin/timestamp_tool
    sources:
      - type: file
        path: timestamp_tool.py
