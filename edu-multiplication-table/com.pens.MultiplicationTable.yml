app-id: com.pens.MultiplicationTable
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: multiplication_table
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: multiplication_table
    buildsystem: simple
    build-commands:
      - install -Dm755 multiplication_table.py /app/bin/multiplication_table
    sources:
      - type: file
        path: multiplication_table.py
