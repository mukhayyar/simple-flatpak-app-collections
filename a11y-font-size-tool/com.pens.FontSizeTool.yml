app-id: com.pens.FontSizeTool
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: font_size_tool
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=home
modules:
  - name: font_size_tool
    buildsystem: simple
    build-commands:
      - install -Dm755 font_size_tool.py /app/bin/font_size_tool
    sources:
      - type: file
        path: font_size_tool.py
