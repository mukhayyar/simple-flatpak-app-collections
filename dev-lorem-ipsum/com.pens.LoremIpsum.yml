app-id: com.pens.LoremIpsum
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: lorem_ipsum
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: lorem_ipsum
    buildsystem: simple
    build-commands:
      - install -Dm755 lorem_ipsum.py /app/bin/lorem_ipsum
    sources:
      - type: file
        path: lorem_ipsum.py
