app-id: com.pens.CronHelper
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: cron_helper
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: cron_helper
    buildsystem: simple
    build-commands:
      - install -Dm755 cron_helper.py /app/bin/cron_helper
    sources:
      - type: file
        path: cron_helper.py
