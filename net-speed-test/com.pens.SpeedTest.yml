app-id: com.pens.SpeedTest
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: speed_test
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=all
modules:
  - name: speed_test
    buildsystem: simple
    build-commands:
      - install -Dm755 speed_test.py /app/bin/speed_test
    sources:
      - type: file
        path: speed_test.py
