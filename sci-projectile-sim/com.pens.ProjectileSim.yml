app-id: com.pens.ProjectileSim
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: projectile_sim
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: projectile_sim
    buildsystem: simple
    build-commands:
      - install -Dm755 projectile_sim.py /app/bin/projectile_sim
    sources:
      - type: file
        path: projectile_sim.py
