app-id: com.pens.PasswordManager
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: password_manager
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=home
modules:
  - name: password_manager
    buildsystem: simple
    build-commands:
      - install -Dm755 password_manager.py /app/bin/password_manager
    sources:
      - type: file
        path: password_manager.py
