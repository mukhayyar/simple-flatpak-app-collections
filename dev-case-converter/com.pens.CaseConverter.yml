app-id: com.pens.CaseConverter
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: case_converter
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: case_converter
    buildsystem: simple
    build-commands:
      - install -Dm755 case_converter.py /app/bin/case_converter
    sources:
      - type: file
        path: case_converter.py
