app-id: com.pens.MathQuiz
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: math_quiz
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: math_quiz
    buildsystem: simple
    build-commands:
      - install -Dm755 math_quiz.py /app/bin/math_quiz
    sources:
      - type: file
        path: math_quiz.py
