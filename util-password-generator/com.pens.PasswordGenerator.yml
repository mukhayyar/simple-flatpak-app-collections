app-id: com.pens.PasswordGenerator
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: password_generator
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: password_generator
    buildsystem: simple
    build-commands:
      - install -Dm755 password_generator.py /app/bin/password_generator
    sources:
      - type: file
        path: password_generator.py
