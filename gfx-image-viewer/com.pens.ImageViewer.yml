app-id: com.pens.ImageViewer
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: image_viewer
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=home
modules:
  - name: image_viewer
    buildsystem: simple
    build-commands:
      - install -Dm755 image_viewer.py /app/bin/image_viewer
    sources:
      - type: file
        path: image_viewer.py
