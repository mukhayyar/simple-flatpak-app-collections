app-id: com.pens.GtkInspector
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: gtk_inspector
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: gtk_inspector
    buildsystem: simple
    build-commands:
      - install -Dm755 gtk_inspector.py /app/bin/gtk_inspector
    sources:
      - type: file
        path: gtk_inspector.py
