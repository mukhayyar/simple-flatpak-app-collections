app-id: com.pens.MeetingCost
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: meeting_cost
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: meeting_cost
    buildsystem: simple
    build-commands:
      - install -Dm755 meeting_cost.py /app/bin/meeting_cost
    sources:
      - type: file
        path: meeting_cost.py
