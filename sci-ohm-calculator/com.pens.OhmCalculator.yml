app-id: com.pens.OhmCalculator
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: ohm_calculator
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: ohm_calculator
    buildsystem: simple
    build-commands:
      - install -Dm755 ohm_calculator.py /app/bin/ohm_calculator
    sources:
      - type: file
        path: ohm_calculator.py
