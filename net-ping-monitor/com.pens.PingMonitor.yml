app-id: com.pens.PingMonitor
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: ping_monitor
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=all
modules:
  - name: ping_monitor
    buildsystem: simple
    build-commands:
      - install -Dm755 ping_monitor.py /app/bin/ping_monitor
    sources:
      - type: file
        path: ping_monitor.py
