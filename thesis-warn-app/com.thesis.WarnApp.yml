app-id: com.thesis.WarnApp
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: warn_app
finish-args:
  - --socket=x11
  - --filesystem=~/.:create
  - --share=network
modules:
  - name: warn_app
    buildsystem: simple
    build-commands:
      - install -Dm755 warn_app.py /app/bin/warn_app
    sources:
      - type: file
        path: warn_app.py
