app-id: com.pens.IpInfo
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: ip_info
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=all
modules:
  - name: ip_info
    buildsystem: simple
    build-commands:
      - install -Dm755 ip_info.py /app/bin/ip_info
    sources:
      - type: file
        path: ip_info.py
