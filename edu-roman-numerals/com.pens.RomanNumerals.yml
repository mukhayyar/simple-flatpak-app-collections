app-id: com.pens.RomanNumerals
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: roman_numerals
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: roman_numerals
    buildsystem: simple
    build-commands:
      - install -Dm755 roman_numerals.py /app/bin/roman_numerals
    sources:
      - type: file
        path: roman_numerals.py
