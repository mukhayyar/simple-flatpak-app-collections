app-id: com.pens.ColorPicker
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: color_picker.py
finish-args:
  # Windowing system access
  - --socket=wayland
  - --socket=fallback-x11
  # Audio access (standard for GUI apps)
  - --socket=pulseaudio
  # No network needed for color picking

modules:
  - name: color-picker
    sources:
      - type: file
        path: color_picker.py
    buildsystem: simple
    build-commands:
      - install -D color_picker.py /app/bin/color_picker.py
      - chmod +x /app/bin/color_picker.py
