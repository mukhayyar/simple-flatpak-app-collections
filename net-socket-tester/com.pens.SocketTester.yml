app-id: com.pens.SocketTester
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: socket_tester
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=all
modules:
  - name: socket_tester
    buildsystem: simple
    build-commands:
      - install -Dm755 socket_tester.py /app/bin/socket_tester
    sources:
      - type: file
        path: socket_tester.py
