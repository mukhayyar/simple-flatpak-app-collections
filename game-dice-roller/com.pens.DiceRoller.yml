app-id: com.pens.DiceRoller
runtime: org.gnome.Platform
runtime-version: '45'
build-commit-tag: '1.0.0'
sdk: org.gnome.Sdk
command: dice_roller
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: dice_roller
    buildsystem: simple
    build-commands:
      - install -Dm755 dice_roller.py /app/bin/dice_roller
    sources:
      - type: file
        path: dice_roller.py
